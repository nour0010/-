<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة طلبات العطور — Areej Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --ink: #F5F2F0;
    --ink2: #D9D1CB;
    --ink3: #B2A8A1;
    --surface: #180F0A;
    --base: #0D0705;
    --base2: #130A06;
    --emerald: #D4A84F;
    --emerald2: #C3923C;
    --emerald3: rgba(212, 168, 79, 0.16);
    --gold: #E0B766;
    --line: rgba(212, 168, 79, 0.12);
    --glass: rgba(24, 15, 10, 0.9);
    --r: 16px;
    --r2: 24px;
    --shadow: 0 10px 40px rgba(0,0,0,0.6);
    --shadow2: 0 20px 60px rgba(0,0,0,0.8);
    
    /* New Dashboard Specific Tokens */
    --accent-glow: rgba(212, 168, 79, 0.2);
    --status-p: #EAB308;
    --status-c: #3B82F6;
    --status-s: #A855F7;
    --status-d: #22C55E;
    --status-x: #EF4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', 'Amiri', sans-serif;
    background: var(--base);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.5;
    background-image: 
      radial-gradient(circle at 10% 10%, rgba(212,168,79,0.03), transparent 30%),
      radial-gradient(circle at 90% 90%, rgba(212,168,79,0.03), transparent 30%);
  }

  /* Grid Background Overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(212,168,79,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(212,168,79,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; }

  /* ── Header ── */
  header {
    background: var(--glass);
    border-bottom: 1px solid var(--line);
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 900;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .header-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 0 clamp(1rem, 4vw, 2.5rem);
    height: 66px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo {
    display: flex; align-items: center; gap: 0.75rem;
    font-size: clamp(0.9rem, 2vw, 1.25rem);
    font-weight: 900;
    background: linear-gradient(135deg, #E9D18A, #C69842);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .logo-dot {
    width: 12px; height: 12px;
    background: linear-gradient(135deg, var(--emerald), var(--gold));
    border-radius: 50%;
    box-shadow: 0 0 15px var(--accent-glow);
    animation: glowPulse 2.5s infinite;
  }

  @keyframes glowPulse {
    0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 15px var(--accent-glow); }
    50% { transform: scale(1.2); opacity: 0.8; box-shadow: 0 0 25px var(--accent-glow); }
  }

  .live-badge {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--emerald3);
    border: 1px solid var(--line);
    color: var(--emerald);
    padding: 0.35rem 0.9rem;
    border-radius: 50px;
    font-size: 0.75rem; font-weight: 800;
    letter-spacing: 0.5px;
  }

  .live-dot {
    width: 8px; height: 8px;
    background: #2ecc71;
    border-radius: 50%;
    box-shadow: 0 0 10px #2ecc71;
    animation: blink 1.5s infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ── Stats ── */
  .stats-bar {
    max-width: 1400px; margin: 0 auto;
    padding: 1.5rem clamp(1rem, 4vw, 2.5rem);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--r2);
    padding: 1.25rem;
    display: flex; align-items: center; gap: 1rem;
    transition: all 0.3s;
    box-shadow: var(--shadow);
  }

  .stat-card:hover { border-color: var(--emerald); transform: translateY(-3px); }

  .stat-icon {
    width: 50px; height: 50px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; flex-shrink: 0;
    background: var(--base2); border: 1px solid var(--line);
  }

  .stat-info { flex: 1; }
  .stat-label { font-size: 0.7rem; color: var(--ink3); font-weight: 800; text-transform: uppercase; margin-bottom: 0.3rem; }
  .stat-value { font-size: 1.6rem; font-weight: 900; color: var(--ink); line-height: 1; letter-spacing: -1px; }
  .stat-value.gold { color: var(--gold); }
  .stat-value.emerald { color: var(--emerald); }

  /* ── Main ── */
  .main {
    max-width: 1400px; margin: 0 auto;
    padding: 0 clamp(1rem, 4vw, 2.5rem) 4rem;
  }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
  }

  .section-title {
    font-size: 1.1rem; font-weight: 900; color: var(--ink);
    display: flex; align-items: center; gap: 0.75rem;
  }

  .section-title::before { content: ''; width: 6px; height: 18px; background: var(--gold); border-radius: 4px; }

  .section-title span {
    background: var(--base2); color: var(--gold);
    font-size: 0.75rem; padding: 0.2rem 0.7rem; border-radius: 10px;
    border: 1px solid var(--line);
  }

  /* Filter Tabs */
  .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  .filter-btn {
    padding: 0.5rem 1.1rem; border-radius: 50px;
    border: 1.5px solid var(--line); background: var(--base2);
    color: var(--ink2); font-family: inherit; font-size: 0.8rem;
    font-weight: 700; cursor: pointer; transition: all 0.25s;
  }

  .filter-btn:hover { border-color: var(--emerald); color: var(--emerald); }
  .filter-btn.active { background: var(--emerald3); border-color: var(--emerald); color: var(--emerald); }

  /* ── Orders Grid ── */
  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.25rem;
    margin-top: 1rem;
  }

  .order-card {
    background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: var(--r);
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
  }

  .order-card:hover {
    border-color: var(--emerald);
    transform: translateY(-5px);
    box-shadow: var(--shadow2);
  }

  .order-card.new-order {
    border-color: var(--gold);
    animation: orderFlash 2s ease-out infinite;
  }
  @keyframes orderFlash {
     0%, 100% { border-color: var(--line); }
     50% { border-color: var(--gold); box-shadow: 0 0 20px rgba(224,183,102,0.3); }
  }

  .order-head {
    padding: 0.75rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }
  .order-head-left { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; min-width: 0; }
  .order-head-meta { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

  .order-count-chip {
    font-size: 0.6rem; color: var(--ink); background: var(--emerald3);
    border: 1px solid var(--line); border-radius: 50px; padding: 0.1rem 0.5rem; font-weight: 800;
  }

  .order-number { font-size: 0.9rem; font-weight: 900; color: var(--gold); letter-spacing: 0.5px; }
  .order-time { font-size: 0.7rem; color: var(--ink3); font-weight: 600; }
  .order-mini { font-size: 0.7rem; color: var(--ink2); font-weight: 700; }

  .status-badge {
    display: flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.65rem;
    border-radius: 50px; font-size: 0.65rem; font-weight: 800; border: 1.5px solid;
  }

  .status-pending { background: rgba(234,179,8,0.1); color: var(--status-p); border-color: rgba(234,179,8,0.3); }
  .status-confirmed { background: rgba(59,130,246,0.1); color: var(--status-c); border-color: rgba(59,130,246,0.3); }
  .status-shipping { background: rgba(168,85,247,0.1); color: var(--status-s); border-color: rgba(168,85,247,0.3); }
  .status-delivered { background: rgba(34,197,94,0.1); color: var(--status-d); border-color: rgba(34,197,94,0.3); }
  .status-cancelled { background: rgba(239,68,68,0.1); color: var(--status-x); border-color: rgba(239,68,68,0.3); }

  .order-body { padding: 0.75rem 1rem; flex: 1; }

  .customer-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
  .avatar {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--base2); border: 1.5px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0; color: var(--gold);
  }
  .customer-info { flex: 1; min-width: 0; }
  .customer-name { font-size: 0.95rem; font-weight: 800; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .customer-phone { font-size: 0.75rem; color: var(--ink3); letter-spacing: 0.5px; }

  .address-row {
    display: flex; align-items: flex-start; gap: 0.6rem;
    margin-bottom: 0.75rem; padding: 0.75rem;
    background: var(--base2); border-radius: 12px; border: 1px solid var(--line);
  }
  .address-icon { font-size: 1rem; filter: sepia(1) saturate(5) hue-rotate(320deg); }
  .address-text { font-size: 0.75rem; color: var(--ink2); line-height: 1.5; }

  .items-list { margin-bottom: 0.75rem; }
  .items-title { font-size: 0.65rem; color: var(--emerald); font-weight: 900; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }

  .items-table-head {
    display: grid; grid-template-columns: 1.4fr 1fr .6fr .9fr;
    gap: 0.5rem; color: var(--ink3); font-size: 0.65rem; font-weight: 800;
    margin-bottom: 0.4rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--line);
  }
  .item-row {
    display: grid; grid-template-columns: 1.4fr 1fr .6fr .9fr;
    gap: 0.5rem; align-items: start; padding: 0.45rem 0;
    font-size: 0.75rem; border-bottom: 1px dashed var(--line);
    font-weight: 600;
  }
  .item-row:last-child { border-bottom: none; }
  .item-name { color: var(--ink); }
  .item-variant { color: var(--ink3); font-size: 0.65rem; text-align: center; }
  .item-qty { color: var(--ink3); font-size: 0.65rem; text-align: center; }
  .item-price { color: var(--gold); font-weight: 800; text-align: left; }

  .order-footer {
    padding: 0.75rem 1rem; background: var(--base2);
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--line);
  }

  .total-label { font-size: 0.7rem; color: var(--ink3); font-weight: 700; }
  .total-value { font-size: 1.05rem; font-weight: 900; color: var(--gold); }

  .summary-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem; margin-bottom: 0.75rem;
  }
  .summary-cell {
    background: var(--base2); border: 1.5px solid var(--line);
    border-radius: 10px; padding: 0.5rem;
  }
  .summary-k { font-size: 0.6rem; color: var(--ink3); font-weight: 800; margin-bottom: 0.2rem; }
  .summary-v { font-size: 0.75rem; color: var(--ink); font-weight: 700; word-break: break-all; }

  .actions { display: flex; gap: 0.3rem; }
  .action-btn {
    padding: 0.35rem 0.75rem; border-radius: 50px; border: 1.5px solid transparent;
    font-family: inherit; font-size: 0.7rem; font-weight: 800;
    cursor: pointer; transition: all 0.25s;
  }
  .btn-confirm { background: var(--status-c); color: #fff; border: none; }
  .btn-confirm:hover { filter: brightness(1.2); transform: scale(1.05); }
  .btn-deliver { background: var(--status-d); color: #fff; border: none; }
  .btn-deliver:hover { filter: brightness(1.2); transform: scale(1.05); }
  .btn-cancel { background: transparent; border-color: var(--status-x); color: var(--status-x); }
  .btn-cancel:hover { background: var(--status-x); color: #fff; }
  .btn-delete { background: rgba(239, 68, 68, 0.1); border-color: rgba(239,68,68,0.2); color: var(--status-x); }
  .btn-delete:hover { background: var(--status-x); color: #fff; }

  /* ── Special UI elements ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface); border: 2px solid var(--gold);
    color: var(--gold); padding: 0.8rem 1.8rem; border-radius: 50px;
    font-weight: 800; z-index: 1000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .sound-btn {
    background: var(--base2); border: 1.5px solid var(--line);
    border-radius: 12px; color: var(--ink3); padding: 0.5rem;
    cursor: pointer; font-size: 1.2rem; transition: all 0.2s;
  }
  .sound-btn.on { color: var(--gold); border-color: var(--gold); background: var(--emerald3); }
  .auth-chip {
    background: var(--base2); border: 1.5px solid var(--line);
    color: var(--ink2); padding: 0.5rem 0.9rem; border-radius: 12px;
    font-size: 0.75rem; font-weight: 700; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  }
  .auth-btn {
    background: var(--emerald); color: #000; border: none;
    padding: 0.5rem 1.1rem; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-size: 0.75rem; font-weight: 900; transition: all 0.2s;
  }
  .auth-btn:hover { background: var(--gold); transform: translateY(-2px); }

  /* ── Responsive ── */
  @media (max-width: 1024px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); padding-top: 1rem; }
  }
  @media (max-width: 768px) {
    .header-inner { height: 60px; }
    .main { padding-bottom: 2rem; }
    .orders-grid { grid-template-columns: 1fr; }
    .stat-value { font-size: 1.3rem; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: 1fr; gap: 0.75rem; }
    .section-header { flex-direction: column; align-items: flex-start; }
    .filters { width: 100%; overflow-x: auto; padding-bottom: 0.5rem; }
    .filter-btn { white-space: nowrap; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="logo-dot"></div>
        ✨ لوحة إدارة الطلبات الفاخرة
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="auth-chip" id="authChip">الحساب: غير مسجل</div>
        <button class="auth-btn" id="authBtn" onclick="goToStoreLogin()">دخول</button>
        <button class="sound-btn on" id="soundBtn" onclick="toggleSound()" title="تنبيه صوتي">🔔</button>
        <div class="live-badge">
          <div class="live-dot"></div>
          مباشر
        </div>
      </div>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-icon emerald">💎</div>
      <div class="stat-info">
        <div class="stat-label">إجمالي الطلبات</div>
        <div class="stat-value emerald" id="statTotal">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="color:#EAB308">⏳</div>
      <div class="stat-info">
        <div class="stat-label">بانتظار التأكيد</div>
        <div class="stat-value" id="statPending" style="color:#EAB308">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="color:#3B82F6">🚚</div>
      <div class="stat-info">
        <div class="stat-label">قيد التوصيل</div>
        <div class="stat-value" id="statShipping" style="color:#3B82F6">—</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon gold">💰</div>
      <div class="stat-info">
        <div class="stat-label">إيرادات اليوم</div>
        <div class="stat-value gold" id="statRevenue">—</div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="section-header">
      <div class="section-title">
        الطلبات الواردة
        <span id="orderCount">0</span>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this)">الكل</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">⏳ معلق</button>
        <button class="filter-btn" onclick="setFilter('confirmed',this)">✅ مؤكد</button>
        <button class="filter-btn" onclick="setFilter('shipping',this)">🚚 توصيل</button>
        <button class="filter-btn" onclick="setFilter('delivered',this)">🎉 مكتمل</button>
      </div>
    </div>

    <div class="orders-grid" id="ordersGrid">
      <div class="loading">
        <div class="spinner"></div>
        <div style="color:var(--text-muted);font-size:14px;">جاري تحميل الطلبات…</div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://lfzwynjzvqoctvftpxpi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TlRYqmbrEq4poa26RcoeVQ_wDtzWDUP';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allOrders = [];
let currentFilter = 'all';
let soundEnabled = true;
let isFirstLoad = true;
let adminAuthorized = false;
let currentUser = null;
const ADMIN_EMAIL_ALLOWLIST = ['byatynwry@gmail.com'];

const STATUS_MAP = {
  pending:   { label: 'معلق',    cls: 'status-pending',   icon: '⏳' },
  confirmed: { label: 'مؤكد',    cls: 'status-confirmed', icon: '✅' },
  shipping:  { label: 'جاري التوصيل', cls: 'status-shipping', icon: '🚚' },
  delivered: { label: 'مكتمل',   cls: 'status-delivered', icon: '🎉' },
  cancelled: { label: 'ملغى',    cls: 'status-cancelled', icon: '❌' },
};

function extractCustomerFromOrder(o) {
  const fromCols = {
    name: (o && o.customer_name ? String(o.customer_name).trim() : ''),
    phone: (o && o.customer_phone ? String(o.customer_phone).trim() : '')
  };
  if (fromCols.name && fromCols.phone) return fromCols;
  const notes = String((o && o.notes) || '');
  const nameMatch = notes.match(/الاسم:\s*([^|]+)/);
  const phoneMatch = notes.match(/الهاتف:\s*([^|]+)/);
  return {
    name: fromCols.name || (nameMatch ? String(nameMatch[1]).trim() : ''),
    phone: fromCols.phone || (phoneMatch ? String(phoneMatch[1]).trim() : '')
  };
}

async function isAdminUser() {
  const { data, error } = await sb.auth.getUser();
  if (error || !data || !data.user) return false;
  const user = data.user;
  const email = String(user.email || '').trim().toLowerCase();
  if (email && ADMIN_EMAIL_ALLOWLIST.includes(email)) return true;
  const meta = user.user_metadata || {};
  const appMeta = user.app_metadata || {};
  if (meta.role === 'admin' || meta.is_admin === true || appMeta.role === 'admin') return true;
  return false;
}

async function syncAuthHeader() {
  const chip = document.getElementById('authChip');
  const btn = document.getElementById('authBtn');
  const { data } = await sb.auth.getUser();
  currentUser = data?.user || null;
  if (!currentUser) {
    chip.textContent = 'الحساب: غير مسجل';
    btn.textContent = 'تسجيل الدخول';
    btn.onclick = goToStoreLogin;
    return;
  }
  chip.textContent = 'الحساب: ' + (currentUser.email || '—');
  btn.textContent = 'تسجيل خروج';
  btn.onclick = logoutDashboard;
}

function goToStoreLogin() {
  window.location.href = 'index.html';
}

async function logoutDashboard() {
  await sb.auth.signOut();
  showToast('تم تسجيل الخروج');
  setTimeout(() => window.location.reload(), 350);
}

function renderAccessDenied() {
  document.getElementById('statTotal').textContent = '—';
  document.getElementById('statPending').textContent = '—';
  document.getElementById('statShipping').textContent = '—';
  document.getElementById('statRevenue').textContent = '—';
  document.getElementById('orderCount').textContent = '0';
  const grid = document.getElementById('ordersGrid');
  grid.innerHTML = `
    <div class="empty">
      <div class="empty-icon">⛔</div>
      <div class="empty-text">هذه الصفحة مخصصة للمشرف فقط. سيتم تحويلك للمتجر...</div>
    </div>`;
  setTimeout(()=>{ window.location.href='index.html'; }, 1200);
}

// ── Fetch orders with items ──
async function loadOrders() {
  if (!adminAuthorized) return;
  const { data, error } = await sb
    .from('orders')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    showToast('❌ فشل تحميل الطلبات: ' + error.message);
    const grid = document.getElementById('ordersGrid');
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">تعذر جلب الطلبات من قاعدة البيانات</div>
      </div>`;
    return;
  }
  const orders = data || [];
  const orderIds = orders.map(o => o.id).filter(Boolean);
  let itemsByOrderId = new Map();
  if (orderIds.length) {
    const { data: itemsData, error: itemsErr } = await sb
      .from('order_items')
      .select('order_id, product_name, variant_name, quantity, unit_price')
      .in('order_id', orderIds);
    if (itemsErr) {
      console.error(itemsErr);
      showToast('⚠️ تم تحميل الطلبات بدون عناصر المشتريات: ' + itemsErr.message);
    } else {
      const grouped = new Map();
      (itemsData || []).forEach(it => {
        const key = it.order_id;
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(it);
      });
      itemsByOrderId = grouped;
    }
  }
  allOrders = orders.map(o => ({ ...o, order_items: itemsByOrderId.get(o.id) || [] }));
  isFirstLoad = false;
  render();
}

// ── Render ──
function render() {
  const filtered = currentFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  document.getElementById('orderCount').textContent = filtered.length;
  updateStats();

  const grid = document.getElementById('ordersGrid');

  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">لا توجد طلبات حالياً</div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map((o, i) => buildCard(o, i)).join('');
}

function buildCard(o, i) {
  const s = STATUS_MAP[o.status] || STATUS_MAP.pending;
  const customer = extractCustomerFromOrder(o);
  const time = new Date(o.created_at).toLocaleString('ar-IQ', {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });

  const itemRows = o.order_items || [];
  const items = itemRows.map(it => `
    <div class="item-row">
      <div class="item-name">
        <span class="item-name">${it.product_name || '—'}</span>
      </div>
      <span class="item-variant">${it.variant_name || 'افتراضي'}</span>
      <span class="item-qty">×${it.quantity || 0}</span>
      <span class="item-price">${fmt(it.unit_price * it.quantity)}</span>
    </div>
  `).join('');

  const address = [o.delivery_city, o.delivery_district, o.delivery_street]
    .filter(Boolean).join('، ');
  const createdAt = new Date(o.created_at).toLocaleString('ar-IQ');
  const paymentMethod = o.payment_method || '—';

  const canConfirm  = o.status === 'pending';
  const canShip     = o.status === 'confirmed';
  const canDeliver  = o.status === 'shipping';
  const canCancel   = !['delivered','cancelled'].includes(o.status);

  return `
    <div class="order-card" style="animation-delay:${i*0.05}s" id="card-${o.id}">
      <div class="order-head">
        <div class="order-head-left">
          <div class="order-number">#${o.order_number || o.id.slice(0,8).toUpperCase()}</div>
          <div class="order-head-meta">
            <div class="order-time">${time}</div>
            <span class="order-count-chip">عدد المنتجات: ${itemRows.length}</span>
            <div class="order-mini">العميل: ${customer.name || 'مستخدم'}</div>
          </div>
        </div>
        <div class="status-badge ${s.cls}">${s.icon} ${s.label}</div>
      </div>

      <div class="order-body">
        <div class="summary-grid">
          <div class="summary-cell">
            <div class="summary-k">الهاتف</div>
            <div class="summary-v">${customer.phone || '—'}</div>
          </div>
          <div class="summary-cell">
            <div class="summary-k">طريقة الدفع</div>
            <div class="summary-v">${paymentMethod}</div>
          </div>
          <div class="summary-cell">
            <div class="summary-k">تاريخ الإنشاء</div>
            <div class="summary-v">${createdAt}</div>
          </div>
        </div>

        ${address ? `
        <div class="address-row">
          <div class="address-icon">📍</div>
          <div class="address-text">${address}${o.delivery_notes ? '<br>ملاحظة التوصيل: '+o.delivery_notes : ''}${o.notes ? '<br>تفاصيل إضافية: '+o.notes : ''}</div>
        </div>` : ''}

        <div class="items-list">
          <div class="items-title">قسم المشتريات (${itemRows.length})</div>
          ${
            items
            ? `<div class="items-table-head"><span>المنتج</span><span style="text-align:center">النوع</span><span style="text-align:center">العدد</span><span style="text-align:left">السعر</span></div>${items}`
            : '<div style="color:var(--text-muted);font-size:12px;">لا توجد عناصر طلب محفوظة. تأكد من حفظ order_items في قاعدة البيانات.</div>'
          }
        </div>
      </div>

      <div class="order-footer">
        <div>
          <div class="total-label">المجموع الكلي</div>
          <div class="total-value">${fmt(o.total)}</div>
        </div>
        <div class="actions">
          ${canConfirm  ? `<button class="action-btn btn-confirm"  onclick="updateStatus('${o.id}','confirmed')">تأكيد</button>` : ''}
          ${canShip     ? `<button class="action-btn btn-confirm"  onclick="updateStatus('${o.id}','shipping')">توصيل</button>` : ''}
          ${canDeliver  ? `<button class="action-btn btn-deliver"  onclick="updateStatus('${o.id}','delivered')">مكتمل</button>` : ''}
          ${canCancel   ? `<button class="action-btn btn-cancel"   onclick="updateStatus('${o.id}','cancelled')">إلغاء</button>` : ''}
          <button class="action-btn btn-delete" onclick="deleteOrder('${o.id}')">حذف</button>
        </div>
      </div>
    </div>`;
}

function fmt(n) {
  return Number(n).toLocaleString('ar-IQ') + ' د.ع';
}

// ── Stats ──
function updateStats() {
  const today = new Date().toDateString();
  const todayOrders = allOrders.filter(o => new Date(o.created_at).toDateString() === today);
  const revenue = todayOrders
    .filter(o => o.status !== 'cancelled')
    .reduce((s, o) => s + Number(o.total), 0);

  document.getElementById('statTotal').textContent    = allOrders.length;
  document.getElementById('statPending').textContent  = allOrders.filter(o=>o.status==='pending').length;
  document.getElementById('statShipping').textContent = allOrders.filter(o=>o.status==='shipping').length;
  document.getElementById('statRevenue').textContent  = fmt(revenue);
}

// ── Update Status ──
async function updateStatus(id, newStatus) {
  const { error } = await sb
    .from('orders')
    .update({ status: newStatus, updated_at: new Date().toISOString() })
    .eq('id', id);

  if (error) { showToast('❌ حصل خطأ: ' + error.message); return; }

  const o = allOrders.find(x => x.id === id);
  if (o) o.status = newStatus;
  render();

  const labels = { confirmed: '✅ تم تأكيد الطلب', shipping: '🚚 بدأ التوصيل', delivered: '🎉 اكتمل الطلب', cancelled: '❌ تم إلغاء الطلب' };
  showToast(labels[newStatus] || 'تم التحديث');
}

// ── Delete Order ──
async function deleteOrder(id) {
  if (!adminAuthorized) return;
  const ok = confirm('هل أنت متأكد من حذف هذا الطلب نهائياً؟');
  if (!ok) return;

  const { error } = await sb.from('orders').delete().eq('id', id);
  if (error) {
    showToast('❌ فشل حذف الطلب: ' + error.message);
    return;
  }

  allOrders = allOrders.filter(o => o.id !== id);
  render();
  showToast('🗑️ تم حذف الطلب');
}

// ── Filter ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Sound ──
function playSound() {
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      o.type = 'sine';
      g.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
      o.start(ctx.currentTime + i * 0.15);
      o.stop(ctx.currentTime + i * 0.15 + 0.3);
    });
  } catch(e) {}
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.classList.toggle('on', soundEnabled);
  btn.textContent = soundEnabled ? '🔔' : '🔕';
}

// ── Realtime ──
function subscribeRealtime() {
  if (!adminAuthorized) return;
  sb.channel('orders-channel')
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'orders'
    }, async (payload) => {
      // Fetch full order with items
      const { data } = await sb
        .from('orders')
        .select('*')
        .eq('id', payload.new.id)
        .single();

      if (data) {
        const { data: its } = await sb
          .from('order_items')
          .select('order_id, product_name, variant_name, quantity, unit_price')
          .eq('order_id', data.id);
        data.order_items = its || [];
        allOrders.unshift(data);
        render();
        // Mark as new
        setTimeout(() => {
          const card = document.getElementById('card-' + data.id);
          if (card) card.classList.add('new-order');
        }, 50);
        playSound();
        showToast('🛒 طلب جديد وصل!');
      }
    })
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'orders'
    }, (payload) => {
      const idx = allOrders.findIndex(o => o.id === payload.new.id);
      if (idx !== -1) {
        allOrders[idx] = { ...allOrders[idx], ...payload.new };
        render();
      }
    })
    .subscribe();
}

// ── Init ──
async function initDashboard() {
  await syncAuthHeader();
  adminAuthorized = await isAdminUser();
  if (!adminAuthorized) {
    renderAccessDenied();
    return;
  }
  await loadOrders();
  subscribeRealtime();
}
initDashboard();
</script>
